name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/homelab-monitor

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Copy compose file
        run: |
          scp -i ~/.ssh/apps-deploy -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            deploy@${{ secrets.APPS_TAILSCALE_IP }}:/opt/stacks/homelab-monitor/

      - name: Deploy to apps VM
        run: |
          ssh -i ~/.ssh/apps-deploy -o StrictHostKeyChecking=no deploy@${{ secrets.APPS_TAILSCALE_IP }} "\
            cd /opt/stacks/homelab-monitor && \
            docker compose -f docker-compose.prod.yml pull && \
            docker compose -f docker-compose.prod.yml up -d"
